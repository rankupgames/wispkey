name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development, main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings -W clippy::suspicious -W clippy::style -W clippy::perf -W clippy::complexity

      - name: Tests
        run: cargo test

      - name: Build release
        run: cargo build --release
